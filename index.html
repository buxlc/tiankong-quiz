<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>填空题题库 - 智能刷题</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafbfc;--bg2:#f0f4f8;--card:#ffffff;
  --pri:#6366f1;--pri2:#818cf8;--pri-light:#e0e7ff;--pri-g:linear-gradient(135deg,#6366f1,#818cf8);
  --ok:#10b981;--ok-light:#d1fae5;--ok-bg:#f0fdf4;
  --err:#f43f5e;--err-light:#ffe4e6;--err-bg:#fff1f2;
  --warn:#f59e0b;--warn-light:#fef3c7;
  --txt:#1e293b;--txt2:#475569;--txt3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,.08);
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
}
body{font-family:-apple-system,"SF Pro Text","Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
/* === Animations === */
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
@keyframes pop{0%{transform:scale(.9);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(99,102,241,.2)}50%{box-shadow:0 0 20px rgba(99,102,241,.35)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fade-in{animation:fadeIn .5s cubic-bezier(.16,1,.3,1) both}
.slide-up{animation:slideUp .6s cubic-bezier(.16,1,.3,1) both}
.slide-in{animation:slideIn .4s cubic-bezier(.16,1,.3,1) both}
.pop-in{animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
/* === Layout === */
.wrap{max-width:820px;margin:0 auto;padding:28px 20px 60px}
/* === Header === */
.header{text-align:center;padding:40px 0 32px}
.logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:12px}
.logo-icon{width:48px;height:48px;background:var(--pri-g);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(99,102,241,.2)}
.logo-icon svg{width:26px;height:26px;color:#fff}
.header h1{font-size:32px;font-weight:700;color:var(--txt);letter-spacing:-.5px}
.header .sub{color:var(--txt3);font-size:15px;margin-top:8px}
/* === Upload Section === */
#upSec{transition:opacity .3s}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--radius);padding:56px 28px;text-align:center;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);background:var(--card);position:relative;overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow-sm)}
.drop-zone::before{content:'';position:absolute;inset:0;background:var(--pri-g);opacity:0;transition:opacity .4s}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--pri);transform:translateY(-2px);box-shadow:var(--shadow)}
.drop-zone:hover::before,.drop-zone.dragover::before{opacity:.04}
.drop-zone>*{position:relative;z-index:1}
.dz-icon{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;background:var(--pri-light);border-radius:20px;margin-bottom:20px;transition:all .3s}
.dz-icon svg{width:36px;height:36px;color:var(--pri)}
.drop-zone:hover .dz-icon{transform:scale(1.05) rotate(-3deg);background:var(--pri);box-shadow:0 8px 24px rgba(99,102,241,.25)}
.drop-zone:hover .dz-icon svg{color:#fff}
.dz-title{font-size:18px;color:var(--txt);margin-bottom:8px;font-weight:600}
.dz-hint{font-size:14px;color:var(--txt3);margin-bottom:24px}
.dz-btn{display:inline-flex;align-items:center;gap:8px;padding:13px 36px;background:var(--pri-g);color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;font-weight:600;transition:all .3s;box-shadow:0 4px 16px rgba(99,102,241,.25)}
.dz-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,.35)}
.dz-btn:active{transform:translateY(0)}
.dz-btn svg{width:18px;height:18px}
input[type=file]{display:none}
/* === File List === */
.file-list{margin-bottom:24px}
.file-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);padding:16px 20px;border-radius:var(--radius-sm);margin-bottom:10px;animation:slideIn .4s cubic-bezier(.16,1,.3,1) both;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.file-name{font-size:14px;color:var(--txt);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:10px}
.file-name svg{width:18px;height:18px;color:var(--pri);flex-shrink:0}
.file-status{font-size:12px;padding:5px 14px;border-radius:20px;font-weight:600;white-space:nowrap;animation:pop .3s ease}
.file-status.loading{background:var(--pri-light);color:var(--pri)}
.file-status.done{background:var(--ok-bg);color:var(--ok)}
.file-status.error{background:var(--err-bg);color:var(--err)}
/* === Stats Badge === */
.stats-bar{text-align:center;margin-bottom:24px}
.badge{display:inline-flex;align-items:center;gap:10px;background:var(--card);color:var(--txt2);padding:10px 22px;border-radius:24px;font-size:14px;font-weight:500;box-shadow:var(--shadow-sm);border:1px solid var(--border);animation:fadeIn .5s ease}
.badge .num{color:var(--pri);font-weight:700;font-size:16px}
.badge .clear-link{color:var(--txt3);font-size:13px;cursor:pointer;text-decoration:underline;margin-left:4px;transition:color .2s}
.badge .clear-link:hover{color:var(--err)}
/* === Loading === */
.loading{display:none;text-align:center;padding:48px;animation:fadeIn .3s}
.loading.active{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.loading-text{color:var(--txt3);font-size:14px}
/* === Mode Selection === */
.mode-panel{display:none;background:var(--card);border-radius:var(--radius);padding:32px;margin-bottom:24px;box-shadow:var(--shadow);animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;border:1px solid var(--border)}
.mode-panel.active{display:block}
.mode-title{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--txt);display:flex;align-items:center;gap:8px}
.mode-title svg{width:20px;height:20px;color:var(--pri)}
.mode-options{display:flex;gap:12px;margin-bottom:28px}
.mode-btn{flex:1;padding:20px;border:2px solid var(--border);border-radius:var(--radius-sm);background:var(--card);font-size:15px;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);font-weight:500;color:var(--txt);display:flex;flex-direction:column;align-items:center;gap:12px}
.mode-btn:hover{border-color:var(--pri);transform:translateY(-2px);box-shadow:var(--shadow)}
.mode-btn.selected{border-color:var(--pri);background:var(--pri-g);color:#fff;box-shadow:0 8px 24px rgba(99,102,241,.2)}
.mode-btn svg{width:28px;height:28px}
.mode-btn .mode-name{font-weight:600}
.mode-btn .mode-desc{font-size:12px;opacity:.7;margin-top:2px}
.count-section{text-align:center;margin-bottom:8px}
.count-label{font-size:14px;color:var(--txt2);margin-bottom:14px;font-weight:500}
.count-options{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.count-btn{padding:10px 24px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:15px;cursor:pointer;transition:all .3s;color:var(--txt);font-weight:600}
.count-btn:hover{border-color:var(--pri);color:var(--pri);transform:translateY(-1px)}
.count-btn.selected{border-color:var(--pri);background:var(--pri);color:#fff}
.count-input{width:72px;padding:10px;border:2px solid var(--border);border-radius:10px;font-size:15px;text-align:center;outline:none;transition:border-color .3s;font-weight:600}
.count-input:focus{border-color:var(--pri)}
.start-wrap{text-align:center;margin-top:28px;display:none;animation:fadeIn .4s}
.start-btn{display:inline-flex;align-items:center;gap:10px;padding:16px 52px;background:var(--pri-g);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(99,102,241,.3)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(99,102,241,.4)}
.start-btn:active{transform:translateY(0)}
.start-btn svg{width:22px;height:22px}/* === Quiz Section === */
.quiz-sec{display:none}
.quiz-sec.active{display:block;animation:fadeIn .5s cubic-bezier(.16,1,.3,1)}
/* === Quiz Header (sticky) === */
.quiz-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;background:rgba(250,251,252,.95);backdrop-filter:blur(12px);padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
.quiz-stats{font-size:14px;color:var(--txt2);display:flex;align-items:center;gap:4px}
.quiz-stats b{color:var(--pri);font-weight:700}
.quiz-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:10px;font-size:13px;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);font-weight:600;font-family:inherit;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn svg{width:16px;height:16px}
.btn-pri{background:var(--pri-g);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.2)}
.btn-ok{background:var(--ok);color:#fff}
.btn-outline{background:var(--card);color:var(--txt2);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.btn-outline:hover{background:var(--bg2);border-color:var(--border2);color:var(--txt)}
.btn-outline.active{background:var(--pri-g);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.2)}
.btn-sm{padding:7px 14px;font-size:12px}
/* === Progress Bar === */
.progress-wrap{width:100%;height:6px;background:var(--bg2);border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:var(--pri-g);border-radius:3px;transition:width .6s cubic-bezier(.16,1,.3,1);width:0}
/* === Results Bar === */
.results-bar{display:none;background:var(--card);border-radius:var(--radius);padding:32px;margin-bottom:24px;text-align:center;box-shadow:var(--shadow);animation:slideUp .6s cubic-bezier(.16,1,.3,1) both;border:1px solid var(--border)}
.results-bar.active{display:block}
.result-score{font-size:56px;font-weight:800;background:var(--pri-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.result-label{font-size:14px;color:var(--txt3);margin-top:8px}
.result-details{display:flex;justify-content:center;gap:48px;margin-top:20px}
.result-details .num{font-size:28px;font-weight:700}
.result-details .label{font-size:13px;color:var(--txt3);margin-top:4px}
.result-details .correct{color:var(--ok)}
.result-details .wrong{color:var(--err)}
/* === Question Card === */
.question-card{background:var(--card);border-radius:var(--radius);padding:28px 32px;margin-bottom:18px;box-shadow:var(--shadow-sm);transition:all .35s cubic-bezier(.16,1,.3,1);animation:slideUp .5s cubic-bezier(.16,1,.3,1) both;border:1px solid var(--border)}
.question-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.question-card.shake{animation:shake .4s ease}
.question-num{font-size:13px;color:var(--pri);font-weight:700;letter-spacing:.5px;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.question-num svg{width:16px;height:16px}
.question-text{font-size:16px;line-height:2.8;word-break:break-word}
.question-source{font-size:13px;color:var(--txt3);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.question-source svg{width:14px;height:14px}
/* === Blank Input === */
.blank-wrap{position:relative;display:inline-block;vertical-align:baseline;margin:0 3px}
.blank-input{display:inline-block;border:none;border-bottom:2px solid var(--pri2);background:var(--pri-light);padding:4px 12px;font-size:15px;min-width:80px;max-width:calc(100vw - 80px);outline:none;border-radius:8px 8px 0 0;font-family:inherit;transition:all .3s cubic-bezier(.16,1,.3,1);vertical-align:baseline}
.blank-input:focus{border-bottom-color:var(--pri);background:#ddd6fe;box-shadow:0 2px 8px rgba(99,102,241,.12)}
.blank-input.correct{background:var(--ok-bg);border-bottom-color:var(--ok);color:#065f46}
.blank-input.wrong{background:var(--err-bg);border-bottom-color:var(--err);color:#9f1239;text-decoration:line-through}
.blank-input:disabled{cursor:default;opacity:.85}
/* === Review Overlay (peek) === */
.review-label{position:absolute;left:12px;right:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--pri);opacity:.5;pointer-events:none;font-family:inherit;white-space:normal;word-break:break-all;line-height:1.3;max-height:2.6em;overflow:hidden;display:none}
.blank-wrap.reviewing .review-label{display:block;animation:fadeIn .25s ease}
.blank-wrap.reviewing .blank-input{color:transparent}
/* === Correct Answer Label === */
.correct-answer{display:inline-flex;align-items:center;gap:4px;background:var(--ok-bg);color:#065f46;padding:3px 12px;border-radius:8px;font-size:13px;font-weight:600;margin-left:8px;border:1px solid rgba(16,185,129,.15);animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}
.correct-answer svg{width:14px;height:14px}
/* === Bottom Actions === */
.bottom-actions{display:flex;justify-content:center;gap:12px;margin-top:32px;flex-wrap:wrap;padding-bottom:24px}
/* === Graded History === */
.graded-section{margin-top:32px;border-top:1px solid var(--border);padding-top:24px;display:none}
.graded-section.active{display:block;animation:fadeIn .5s ease}
.graded-header{font-size:14px;color:var(--txt2);margin-bottom:16px;font-weight:600}
.graded-selector{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.graded-btn{padding:8px 18px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:13px;cursor:pointer;font-weight:600;transition:all .3s;color:var(--txt)}
.graded-btn:hover{border-color:var(--pri);color:var(--pri)}
.graded-btn.selected{background:var(--pri);color:#fff;border-color:var(--pri)}
.graded-view{margin-top:12px}
.graded-card{opacity:.85;transition:opacity .3s}
.graded-card:hover{opacity:1}
/* === Recitation Mode === */
.recite-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;animation:pop .3s ease}
.recite-badge svg{width:14px;height:14px}
.recite-wrong-count{display:inline-flex;align-items:center;gap:6px;background:var(--err-bg);color:var(--err);padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-left:8px}
.recite-wrong-count svg{width:14px;height:14px}
/* === Toast === */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:999;background:var(--card);padding:14px 28px;border-radius:14px;box-shadow:var(--shadow-lg);font-size:14px;font-weight:500;transition:transform .5s cubic-bezier(.16,1,.3,1);pointer-events:none;border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-left:4px solid var(--ok)}
.toast.error{border-left:4px solid var(--err)}
.toast.info{border-left:4px solid var(--pri)}
/* === Floating Review Button === */
.float-btn{position:fixed;right:24px;bottom:28px;z-index:100;width:56px;height:56px;border-radius:50%;border:none;cursor:grab;box-shadow:0 4px 20px rgba(99,102,241,.3);display:none;align-items:center;justify-content:center;background:var(--pri-g);color:#fff;touch-action:none;user-select:none;transition:all .3s cubic-bezier(.16,1,.3,1)}
.float-btn svg{width:24px;height:24px}
.float-btn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(99,102,241,.4)}
.float-btn:active{cursor:grabbing;transform:scale(.95)}
.float-btn.active{background:linear-gradient(135deg,#7c3aed,#a78bfa);box-shadow:0 4px 20px rgba(124,58,237,.35)}
/* === Responsive === */
@media(max-width:640px){
  .wrap{padding:20px 14px 60px}
  .header h1{font-size:26px}
  .header{padding:28px 0 24px}
  .question-card{padding:22px 18px}
  .blank-input{min-width:70px;font-size:14px}
  .quiz-header{padding:12px 0;gap:8px}
  .btn{padding:7px 14px;font-size:12px}
  .float-btn{width:50px;height:50px;right:16px;bottom:20px}
  .float-btn svg{width:22px;height:22px}
  .drop-zone{padding:40px 18px}
  .mode-panel{padding:24px 18px}
  .mode-options{gap:8px}
  .mode-btn{padding:16px 12px}
}
</style>
</head>

// ===== IndexedDB =====
const DBN='tiankongDB',DBV=1,STORE='questions';
function openDB(){return new Promise((ok,no)=>{const r=indexedDB.open(DBN,DBV);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE))db.createObjectStore(STORE,{keyPath:'id',autoIncrement:true})};r.onsuccess=e=>ok(e.target.result);r.onerror=e=>no(e)})}
function dbAll(){return new Promise((ok,no)=>{openDB().then(db=>{const tx=db.transaction(STORE,'readonly');const s=tx.objectStore(STORE);const r=s.getAll();r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r)})})}
function dbAdd(items){return new Promise((ok,no)=>{openDB().then(db=>{const tx=db.transaction(STORE,'readwrite');const s=tx.objectStore(STORE);items.forEach(it=>s.add(it));tx.oncomplete=()=>ok();tx.onerror=()=>no(tx.error)})})}
function dbClear(){return new Promise((ok,no)=>{openDB().then(db=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).clear();tx.oncomplete=()=>ok()})})}
// ===== ZIP Parser =====
class MZip{
  constructor(buf){this.dv=new DataView(buf);this.by=new Uint8Array(buf)}
  findEOCD(){for(let i=this.by.length-22;i>=0;i--)if(this.dv.getUint32(i,true)===0x06054b50)return i;return -1}
  async files(){
    const eo=this.findEOCD();if(eo<0)throw new Error('Invalid ZIP');
    const cdOff=this.dv.getUint32(eo+16,true),cdN=this.dv.getUint16(eo+10,true);
    const out={};let off=cdOff;
    for(let i=0;i<cdN;i++){
      if(this.dv.getUint32(off,true)!==0x02014b50)break;
      const cm=this.dv.getUint16(off+10,true),cs=this.dv.getUint32(off+20,true);
      const nl=this.dv.getUint16(off+28,true),el=this.dv.getUint16(off+30,true),cl=this.dv.getUint16(off+32,true);
      const lo=this.dv.getUint32(off+42,true);
      const fn=new TextDecoder().decode(this.by.slice(off+46,off+46+nl));
      const lnl=this.dv.getUint16(lo+26,true),lel=this.dv.getUint16(lo+28,true);
      const doff=lo+30+lnl+lel;const cd=this.by.slice(doff,doff+cs);let fd;
      if(cm===0){fd=cd}
      else if(cm===8){try{const ds=new DecompressionStream('deflate-raw');const w=ds.writable.getWriter(),rd=ds.readable.getReader();w.write(cd);w.close();const ch=[];while(true){const{done,value}=await rd.read();if(done)break;ch.push(value)}const tl=ch.reduce((s,c)=>s+c.length,0);fd=new Uint8Array(tl);let p=0;for(const c of ch){fd.set(c,p);p+=c.length}}catch(e){fd=new Uint8Array(0)}}else{fd=new Uint8Array(0)}
      out[fn]=fd;off+=46+nl+el+cl;
    }return out;
  }
}
// ===== DOCX Parser =====
const NS='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
function gdc(p,ln){for(let i=0;i<p.childNodes.length;i++){const c=p.childNodes[i];if(c.nodeType===1&&c.localName===ln&&(c.namespaceURI===NS||!c.namespaceURI))return c}return null}
function gdcs(p,ln){const r=[];for(let i=0;i<p.childNodes.length;i++){const c=p.childNodes[i];if(c.nodeType===1&&c.localName===ln&&(c.namespaceURI===NS||!c.namespaceURI))r.push(c)}return r}
function hasUL(rp){const us=gdcs(rp,'u');for(const u of us){const v=u.getAttributeNS(NS,'val')||u.getAttribute('w:val')||'single';if(v!=='none')return true}return false}
function parseDocx(xml){
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  const ps=doc.getElementsByTagNameNS(NS,'p');const qs=[];
  for(let pi=0;pi<ps.length;pi++){
    const para=ps[pi];let defUL=false;const pPr=gdc(para,'pPr');
    if(pPr){const prp=gdc(pPr,'rPr');if(prp&&hasUL(prp))defUL=true}
    const segs=[];const runs=gdcs(para,'r');
    for(const run of runs){const rPr=gdc(run,'rPr');let ul=false;if(rPr){if(hasUL(rPr))ul=true}else if(defUL)ul=true;const ts=run.getElementsByTagNameNS(NS,'t');let txt='';for(let t=0;t<ts.length;t++)txt+=(ts[t].textContent||'');if(txt)segs.push({text:txt,isUnderlined:ul})}
    if(!segs.length||!segs.some(s=>s.isUnderlined))continue;
    const mg=[];for(const s of segs){if(mg.length&&mg[mg.length-1].isUnderlined===s.isUnderlined){mg[mg.length-1].text+=s.text}else{mg.push({text:s.text,isUnderlined:s.isUnderlined})}}
    qs.push({segments:mg,fullText:segs.map(s=>s.text).join('')});
  }return qs;
}

const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),fileList=document.getElementById('fileList'),loading=document.getElementById('loading'),startWrap=document.getElementById('startWrap');

dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});

fileInput.addEventListener('change',e=>handleFiles(e.target.files));async function handleFiles(files){
  if(!files.length)return;
  loading.classList.add('active');startWrap.style.display='none';
  const arr=Array.from(files).filter(f=>f.name.endsWith('.docx'));
  if(!arr.length){showToast('请选择 .docx 格式的 Word 文档','error');loading.classList.remove('active');return}
  for(const f of arr){
    const item=addFileItem(f.name);

      const buf=await f.arrayBuffer();const zip=new MZip(buf);const zfs=await zip.files();
      const xm=zfs['word/document.xml'];
      if(!xm){item.setStatus('error','无效文档');continue}
      const xmls=new TextDecoder().decode(xm);const qs=parseDocx(xmls);
      if(!qs.length){item.setStatus('error','未找到下划线内容');continue}
      await dbAdd(qs.map(q=>({...q,source:f.name})));
      item.setStatus('done',qs.length+' 题');
    }catch(e){item.setStatus('error','解析失败: '+e.message)}
  }
  loading.classList.remove('active');await loadInfo();
}

async function startQuiz(){
  document.getElementById('upSec').style.display='none';
  document.getElementById('quizSec').classList.add('active');
  if(mode==='review')document.getElementById('floatBtn').style.display='flex';
  graded=false;rvOn=false;usedSet=new Set();orderIdx=0;batchHist=[];gradedBatches=[];
  wrongQueue=[];reciteCount=0;recitePhase='normal';

}
async function loadBatch(){
  const all=await dbAll();totalQ=all.length;
  const avail=[];for(let i=0;i<all.length;i++){if(!usedSet.has(i))avail.push(i)}
  if(mode==='recite'&&wrongQueue.length>0&&(reciteCount>=5||avail.length===0)){
    recitePhase='retry';let cnt=Math.min(wrongQueue.length,5);
    if(avail.length>0&&avail.length<5){cnt=avail.length;const picked=avail.slice(0,cnt);const wrongItems=wrongQueue.splice(0,5-avail.length);picked.forEach(i=>usedSet.add(i));wrongItems.forEach(wq=>usedSet.add(wq));const combined=[...picked,...wrongItems];batchHist.push(combined);curQ=combined.map(i=>({...all[i],_idx:i,isRetry:!avail.includes(i)}));reciteCount=0;recitePhase='normal'}else{const wrongItems=wrongQueue.splice(0,cnt);wrongItems.forEach(wq=>usedSet.delete(wq));batchHist.push(wrongItems);curQ=wrongItems.map(i=>({...all[i],_idx:i,isRetry:true}));reciteCount=0}
  }else{
    recitePhase='normal';
    if(!avail.length){curQ=[];updateStats();renderQ();return}
    let cnt=selCnt>0?selCnt:avail.length;let picked;

      if(mode==='recite'&&wrongQueue.length>0){const wrongItems=wrongQueue.splice(0,Math.min(wrongQueue.length,5));wrongItems.forEach(wq=>usedSet.delete(wq));batchHist.push(wrongItems);curQ=wrongItems.map(i=>({...all[i],_idx:i,isRetry:true}));reciteCount=0}else{curQ=[];updateStats();renderQ();return}
    }else{
      while(orderIdx<all.length&&usedSet.has(orderIdx))orderIdx++;
      picked=[];let scan=orderIdx;
      while(picked.length<cnt&&scan<all.length){if(!usedSet.has(scan))picked.push(scan);scan++}
      orderIdx=scan;batchHist.push(picked);picked.forEach(i=>usedSet.add(i));

    }
  }

}

function norm(s){return s.replace(/[\s\u3000\p{P}\p{S}]/gu,"").toLowerCase()}
function grade(){
  const inps=document.querySelectorAll('.blank-input');if(!inps.length)return;
  if(rvOn){rvOn=false;document.getElementById('floatBtn').classList.remove('active');applyReview()}
  let ok=0,wr=0;
  inps.forEach(inp=>{
    inp.disabled=true;
    const ua=inp.value.trim(),ca=inp.dataset.answer;
    let nx=inp.nextElementSibling;while(nx){const cur=nx;nx=nx.nextElementSibling;if(cur.classList.contains('correct-answer'))cur.remove()}
    if(norm(ua)===norm(ca)){inp.classList.add('correct');inp.classList.remove('wrong');ok++}
    else{
      inp.classList.add('wrong');inp.classList.remove('correct');wr++;
      const l=document.createElement('span');l.className='correct-answer';
      l.innerHTML='<svg><use href="#i-check"/></svg>'+ca;
      inp.parentNode.insertBefore(l,inp.nextSibling);
      if(mode==='recite'){const card=inp.closest('.question-card');const idx=[...document.getElementById('questionsContainer').children].indexOf(card);const qIdx=curQ[idx]?._idx;if(qIdx!==undefined&&!wrongQueue.includes(qIdx))wrongQueue.push(qIdx);card.classList.add('shake')}
    }
  });

  const cards=document.getElementById('questionsContainer').children;
  const gradedCards=[];for(let i=0;i<cards.length;i++){const c=cards[i].cloneNode(true);c.classList.add('graded-card');gradedCards.push(c)}
  gradedBatches.push({cards:gradedCards,ok,wr,pct});renderGraded();
  const rb=document.getElementById('resultsBar');rb.classList.add('active');
  document.getElementById('resultScore').textContent=pct+'%';
  document.getElementById('correctCount').textContent=ok;
  document.getElementById('wrongCount').textContent=wr;
  document.getElementById('progressFill').style.width='100%';
  updateReciteBadge();
  if(pct>=80)showToast('太棒了！正确率 '+pct+'%','success');
  else if(pct>=50)showToast('继续加油！正确率 '+pct+'%','info');
  else showToast('需要多复习哦，正确率 '+pct+'%','error');
  window.scrollTo({top:0,behavior:'smooth'});
}
// ===== Review Mode =====
function toggleReview(){if(mode!=='review')return;rvOn=!rvOn;document.getElementById('floatBtn').classList.toggle('active',rvOn);applyReview()}
function applyReview(){document.querySelectorAll('.blank-wrap').forEach(w=>{if(rvOn&&!graded)w.classList.add('reviewing');else w.classList.remove('reviewing')})}
function resetQ(){
  graded=false;rvOn=false;document.getElementById('floatBtn').classList.remove('active');
  document.querySelectorAll('.blank-wrap').forEach(w=>{
    w.classList.remove('reviewing');
    const inp=w.querySelector('.blank-input');if(!inp)return;
    inp.value='';inp.disabled=false;inp.classList.remove('correct','wrong');
    let nx=inp.nextElementSibling;while(nx){const cur=nx;nx=nx.nextElementSibling;if(cur.classList.contains('correct-answer'))cur.remove()}
  });
  document.getElementById('resultsBar').classList.remove('active');
  document.getElementById('answeredCount').textContent='0';
  document.getElementById('progressFill').style.width='0%';
}
async function nextB(){
  if(!graded)grade();
  graded=false;rvOn=false;document.getElementById('floatBtn').classList.remove('active');
  await loadBatch();
  if(!curQ.length){showToast('所有题目都做过了！可以点"重做"或上传新文件','info');return}
  window.scrollTo({top:0,behavior:'smooth'});
}
async function prevB(){
  if(!graded)grade();
  if(batchHist.length<=1){showToast('没有上一批了','info');return}
  graded=false;rvOn=false;document.getElementById('floatBtn').classList.remove('active');
  const last=batchHist.pop();last.forEach(i=>usedSet.delete(i));
  const prev=batchHist[batchHist.length-1];const all=await dbAll();
  curQ=prev.map(i=>({...all[i],_idx:i}));updateStats();renderQ();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goBack(){
  document.getElementById('quizSec').classList.remove('active');
  document.getElementById('floatBtn').style.display='none';
  document.getElementById('upSec').style.display='block';
  document.getElementById('modePanel').classList.remove('active');
  document.getElementById('gradedSection').classList.remove('active');
  document.getElementById('gradedSelector').innerHTML='';
  document.getElementById('gradedView').innerHTML='';
  fileList.innerHTML='';graded=false;gradedBatches=[];rvOn=false;selCnt=0;usedSet=new Set();orderIdx=0;batchHist=[];wrongQueue=[];reciteCount=0;recitePhase='normal';
  loadInfo();
}
// ===== Graded History =====
function renderGraded(){
  const sec=document.getElementById('gradedSection');
  if(!gradedBatches.length){sec.classList.remove('active');return}
  sec.classList.add('active');
  const sel=document.getElementById('gradedSelector');sel.innerHTML='';
  gradedBatches.forEach((b,i)=>{const btn=document.createElement('button');btn.className='graded-btn'+(i===gradedBatches.length-1?' selected':'');btn.textContent='第'+(i+1)+'批 '+b.pct+'%';btn.onclick=()=>showGradedBatch(i);sel.appendChild(btn)});
  showGradedBatch(gradedBatches.length-1);
}
function showGradedBatch(idx){
  document.querySelectorAll('.graded-btn').forEach((b,i)=>b.classList.toggle('selected',i===idx));
  const b=gradedBatches[idx],view=document.getElementById('gradedView');
  view.innerHTML='<div class="graded-header">'+b.ok+'/'+b.cards.length+'题正确 ('+b.pct+'%)</div>';
  b.cards.forEach(c=>view.appendChild(c));
}
// ===== Drag floating button =====
(function(){
  const btn=document.getElementById("floatBtn");
  let dragging=false,startX,startY,origX,origY,moved=false;
  function pt(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
  function onStart(e){if(e.cancelable&&e.type==="touchstart")e.preventDefault();dragging=true;moved=false;const p=pt(e);startX=p.x;startY=p.y;const r=btn.getBoundingClientRect();origX=r.left;origY=r.top}
  function onMove(e){if(!dragging)return;if(e.cancelable)e.preventDefault();const p=pt(e);const dx=p.x-startX,dy=p.y-startY;if(Math.abs(dx)+Math.abs(dy)>8)moved=true;if(!moved)return;let nx=origX+dx,ny=origY+dy;nx=Math.max(4,Math.min(window.innerWidth-60,nx));ny=Math.max(4,Math.min(window.innerHeight-60,ny));btn.style.left=nx+"px";btn.style.top=ny+"px";btn.style.right="auto";btn.style.bottom="auto"}
  function onEnd(){if(!dragging)return;dragging=false;if(!moved)toggleReview()}
  btn.addEventListener("mousedown",function(e){e.preventDefault();onStart(e)});
  btn.addEventListener("touchstart",onStart,{passive:false});
  document.addEventListener("mousemove",onMove);document.addEventListener("touchmove",onMove,{passive:false});
  document.addEventListener("mouseup",onEnd);document.addEventListener("touchend",onEnd);
})();
// ===== Init =====
loadInfo();
</script>
